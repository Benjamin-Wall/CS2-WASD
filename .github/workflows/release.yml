name: Compile and Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 📁 Checkout Repository
      uses: actions/checkout@v4

    - name: 🛠️ Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: 📦 Restore Dependencies
      run: dotnet restore

    - name: ⚙️ Build Plugin (Release Mode)
      run: dotnet build --configuration Release --no-restore

    - name: 🗜️ Package for Server Root Layout
      run: |
        mkdir -p staging/addons/counterstrikesharp/plugins/cs2-wasd
        find . -type f -name "cs2-wasd.dll" -path "*/bin/Release/*" -exec cp {} staging/addons/counterstrikesharp/plugins/cs2-wasd/ \;
        cd staging
        zip -r ../cs2-wasd-${{ github.ref_name }}.zip addons/
        
    - name: 🚀 Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: cs2-wasd-${{ github.ref_name }}.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}